spring.application.name=simplifica
server.port=${PORT:8080}

# Anthropic — defina ANTHROPIC_API_KEY no ambiente (Railway, .env, etc.)
anthropic.api-key=${ANTHROPIC_API_KEY}

# CORS — em produção troque "*" pelo domínio do frontend (ex.: https://simplifica.vercel.app)
cors.allowed-origins=*

# Erros legíveis no body da resposta
server.error.include-message=always
server.error.include-binding-errors=always
